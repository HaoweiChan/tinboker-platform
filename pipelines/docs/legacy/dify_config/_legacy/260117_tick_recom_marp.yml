            \ Field Structure**:\n   - The content field should contain the COMPLETE\
            \ slide including:\n     * <style> CSS block with Global Base CSS + slide-specific CSS (Summary Table CSS or Ticker Dashboard CSS)\n     * Heading\n     * Full\
            \ HTML structure with all div elements properly nested\n   - Do NOT put\
            \ CSS or HTML structure in bullet_points field\n   - bullet_points field\
