      tags:
      - podcast
      summary: Get Podcast Episodes
      description: 'Get episodes for a podcast


        Query params:

        - sort_by: Sort field (created_time, episode_number, episode_title)

        - order: Sort order (asc, desc)

        - limit: Maximum number of episodes to return (1-200)

        - offset: Pagination offset


        CDN Cache: 30 minutes'
      operationId: get_podcast_episodes_api_podcast__podcast_name__episodes_get
      parameters:
      - name: podcast_name
        in: path
        required: true
        schema:
          type: string
          description: Podcast name
          title: Podcast Name
        description: Podcast name
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          description: Sort field (created_time, episode_number, episode_title)
          default: created_time
          title: Sort By
        description: Sort field (created_time, episode_number, episode_title)
      - name: order
        in: query
        required: false
        schema:
          type: string
          description: Sort order (asc, desc)
          default: desc
          title: Order
        description: Sort order (asc, desc)
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Maximum number of episodes to return (1-200)
          default: 50
          title: Limit
        description: Maximum number of episodes to return (1-200)
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset
          default: 0
          title: Offset
        description: Pagination offset
      - name: include_content
        in: query
        required: false
        schema:
          type: boolean
          description: Include heavy content fields (transcript, summary)
          default: false
          title: Include Content
        description: Include heavy content fields (transcript, summary)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Episode'
                title: Response Get Podcast Episodes Api Podcast  Podcast Name  Episodes
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/podcast/{podcast_name}/episodes/{episode_id}:
    get:
      tags:
      - podcast
      summary: Get Episode By Id
      description: 'Get specific episode by ID


        Returns complete episode data including transcript, summary, and related tickers


        CDN Cache: 30 minutes'
      operationId: get_episode_by_id_api_podcast__podcast_name__episodes__episode_id__get
      parameters:
      - name: podcast_name
        in: path
        required: true
        schema:
          type: string
          description: Podcast name
          title: Podcast Name
        description: Podcast name
      - name: episode_id
        in: path
        required: true
        schema:
          type: string
          description: Episode ID
          title: Episode Id
        description: Episode ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Episode'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/podcast/{podcast_name}/episodes/{episode_id}/summary:
    put:
      tags:
      - podcast
      summary: Update Episode Summary
      description: "Update episode summary with modified content\n\nNote: This endpoint\
        \ is always available on the backend, but the frontend \nonly exposes it when\
        \ VITE_STAGE != PRODUCTION\n\nArgs:\n    podcast_name: Podcast name\n    episode_id:\
        \ Episode ID\n    content: Modified summary markdown content\n    modified_by:\
        \ Optional user identifier (email or ID)\n\nReturns:\n    Updated Episode\
        \ object\n    \nRaises:\n    HTTPException(404): If episode not found\n  \
        \  HTTPException(500): If GCS or Firestore operation fails"
      operationId: update_episode_summary_api_podcast__podcast_name__episodes__episode_id__summary_put
      parameters:
      - name: podcast_name
        in: path
        required: true
        schema:
          type: string
          description: Podcast name
          title: Podcast Name
        description: Podcast name
      - name: episode_id
        in: path
        required: true
        schema:
          type: string
          description: Episode ID
          title: Episode Id
        description: Episode ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_update_episode_summary_api_podcast__podcast_name__episodes__episode_id__summary_put'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Episode'
