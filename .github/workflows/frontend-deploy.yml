# Deploy to Cloudflare Pages with secrets from Google Secret Manager
name: Frontend Deploy to Cloudflare Pages

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths: ['frontend/**']
  workflow_dispatch:

env:
  GCP_PROJECT_ID: gen-lang-client-0901363254

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets from Google Secret Manager
        id: secrets
        run: |
          GOOGLE_CLIENT_ID=$(gcloud secrets versions access latest --secret=GOOGLE_CLIENT_ID --project=$GCP_PROJECT_ID)
          echo "::add-mask::$GOOGLE_CLIENT_ID"
          echo "VITE_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ env.VITE_GOOGLE_CLIENT_ID }}
          # EnvGate (auth wall) and dev-portal routing key off VITE_STAGE at BUILD
          # time. Without this, every env built with VITE_STAGE undefined → all
          # gated + labeled "開發環境", incl. prod. tag → PRODUCTION (public, ungated),
          # main → STAGING (測試環境), anything else → DEV.
          VITE_STAGE: ${{ startsWith(github.ref, 'refs/tags/v') && 'PRODUCTION' || github.ref_name == 'main' && 'STAGING' || 'DEV' }}
          # On a tagged prod build, surface the release tag as the app version label
          # (vite strips the leading "v"); empty on branch builds → falls back to package.json.
          VITE_RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "url=https://tinboker.com" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "branch=staging" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "url=https://staging.tinboker.com" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "url=https://dev.tinboker.com" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # CF Pages project name is immutable and owns the prod custom domains;
          # it stays "tinboker-platform" even though the repo is now "tinboker".
          projectName: tinboker-platform
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.env.outputs.branch }}

      - name: Purge Cloudflare CDN cache
        if: success()
        run: |
          CF_API_TOKEN=$(gcloud secrets versions access latest --secret=CLOUDFLARE_API_TOKEN --project=$GCP_PROJECT_ID 2>/dev/null || echo "")
          CF_ZONE_TAG=$(gcloud secrets versions access latest --secret=CLOUDFLARE_ZONE_TAG --project=$GCP_PROJECT_ID 2>/dev/null || echo "")
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_TAG" ]; then
            echo "::warning::Cloudflare credentials missing; skipping CDN purge."
            exit 0
          fi
          # Determine frontend hosts for this environment
          case "${{ steps.env.outputs.environment }}" in
            production) HOSTS='["tinboker.com","www.tinboker.com"]' ;;
            staging)    HOSTS='["staging.tinboker.com"]' ;;
            dev)        HOSTS='["dev.tinboker.com"]' ;;
          esac
          echo "Purging CDN cache for $HOSTS ..."
          RESP=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_TAG}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"hosts\":${HOSTS}}" || true)
          if echo "$RESP" | grep -Eq '"success":[[:space:]]*true'; then
            echo "✅ CDN cache purged for $HOSTS"
          else
            echo "::warning::Host-scoped purge failed; falling back to purge_everything."
            curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_TAG}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}' || true
          fi

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.env.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cloudflare branch:** ${{ steps.env.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CDN purge:** attempted for frontend hosts" >> $GITHUB_STEP_SUMMARY
