        prompt_template:
        - id: extractor-system
          role: system
          text: 'You are a financial news extraction agent analyzing podcast transcripts.


            Your task:

            1. Identify discrete market-moving events from the transcript

            2. Extract only the title and context for each event

            3. Focus on financial and market-relevant content only


            Rules:

            - Extract ONLY financial/market events - discard non-financial content

            - Title should be a short, descriptive title of the financial or market
            event

            - Context should contain all raw text from the transcript related to this
            event

            - Never invent facts not present in the transcript

            - Preserve exact wording from the transcript in the context field

            - Each event should be a discrete, separate market-moving occurrence

            - Err on the side of more granular events rather than combining multiple
            events

            '
        - id: 97e66c56-f630-4892-92cd-68ca7c7dd89a
          role: user
          text: 'Analyze this transcript and extract all market-relevant events.


            Source: {{#start_node.source#}}

            Episode Title: {{#start_node.episode_title#}}


            Transcript (processed, split into sentences, and timestamped):

            {{#timestamp_matching_node.sentences#}}


            The transcript above has been split into sentences with timestamps. Extract
            the sentences and analyze them to identify market-relevant events.

            For each event, extract:

            - A short descriptive title

            - All raw text from the transcript (sentences) related to this event


            Focus only on events that would inform investment decisions or affect
            market movements.

            '
