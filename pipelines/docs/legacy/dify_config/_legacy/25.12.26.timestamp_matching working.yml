    - data:
        code: "from typing import List, Dict, Tuple, Optional, Union\nfrom difflib\
          \ import SequenceMatcher\nimport json\n\ndef build_char_to_timestamp_map(words:\
          \ List[Dict]) -> Tuple[str, Dict[int, Tuple[int, int]]]:\n    \"\"\"Build\
          \ a mapping from character position to timestamps.\"\"\"\n    original_text\
          \ = \"\"\n    char_to_timestamp = {}\n    char_index = 0\n    \n    for\
          \ word in words:\n        word_text = word.get('text', '')\n        start_ms\
          \ = word.get('start', 0)\n        end_ms = word.get('end', 0)\n        \n\
          \        for char in word_text:\n            char_to_timestamp[char_index]\
          \ = (start_ms, end_ms)\n            original_text += char\n            char_index\
          \ += 1\n    \n    return original_text, char_to_timestamp\n\n\ndef find_best_match(sentence:\
          \ str, original_text: str, search_start: int = 0) -> Tuple[int, float]:\n\
          \    \"\"\"Find the best matching position for a sentence.\"\"\"\n    sentence\
          \ = sentence.strip()\n    if not sentence:\n        return search_start,\
          \ 0.0\n    \n    # Try exact match first\n    exact_pos = original_text.find(sentence,\
          \ search_start)\n    if exact_pos != -1:\n        return exact_pos, 1.0\n\
          \    \n    # Fuzzy matching with sliding window\n    best_pos = search_start\n\
          \    best_score = 0.0\n    window_size = len(sentence) * 2\n    \n    search_end\
          \ = min(search_start + window_size, len(original_text))\n    search_text\
          \ = original_text[search_start:search_end]\n    \n    matcher = SequenceMatcher(None,\
          \ sentence, search_text)\n    match = matcher.find_longest_match(0, len(sentence),\
          \ 0, len(search_text))\n    \n    if match.size > 0:\n        similarity\
          \ = match.size / max(len(sentence), len(search_text))\n        if similarity\
          \ > best_score:\n            best_score = similarity\n            best_pos\
          \ = search_start + match.b\n    \n    # If no good match, try sliding window\n\
          \    if best_score < 0.5:\n        for i in range(search_start, min(len(original_text)\
          \ - len(sentence) + 1, search_start + window_size * 2)):\n            window\
          \ = original_text[i:i + len(sentence) + 50]\n            matcher = SequenceMatcher(None,\
          \ sentence, window)\n            similarity = matcher.ratio()\n        \
          \    if similarity > best_score:\n                best_score = similarity\n\
          \                best_pos = i\n                if similarity > 0.8:\n  \
          \                  break\n    \n    return best_pos, best_score\n\n\ndef\
          \ align_characters(sentence: str, original_text: str, start_pos: int) ->\
          \ Dict[int, int]:\n    \"\"\"Align characters between sentence and original\
          \ text.\"\"\"\n    alignment = {}\n    sentence_idx = 0\n    original_idx\
          \ = start_pos\n    \n    segment = original_text[start_pos:start_pos + len(sentence)\
          \ * 2]\n    matcher = SequenceMatcher(None, sentence, segment)\n    \n \
          \   for tag, i1, i2, j1, j2 in matcher.get_opcodes():\n        if tag ==\
          \ 'equal':\n            for k in range(i2 - i1):\n                alignment[sentence_idx\
          \ + k] = original_idx + j1 + k\n            sentence_idx += (i2 - i1)\n\
          \            original_idx += (j2 - j1)\n        elif tag == 'replace':\n\
          \            for k in range(i2 - i1):\n                if j1 + k < j2:\n\
          \                    alignment[sentence_idx + k] = original_idx + j1 + k\n\
          \                else:\n                    alignment[sentence_idx + k]\
          \ = original_idx + j2 - 1\n            sentence_idx += (i2 - i1)\n     \
          \       original_idx += (j2 - j1)\n        elif tag == 'delete':\n     \
          \       sentence_idx += (i2 - i1)\n        elif tag == 'insert':\n     \
          \       for k in range(i2 - i1):\n                alignment[sentence_idx\
          \ + k] = original_idx + j1\n            sentence_idx += (i2 - i1)\n    \
          \        original_idx += (j2 - j1)\n    \n    return alignment\n\n\ndef\
          \ match_sentence_to_timestamps(\n    sentence: str,\n    original_text:\
          \ str,\n    char_to_timestamp: Dict[int, Tuple[int, int]],\n    search_start:\
          \ int = 0\n) -> Tuple[Optional[int], Optional[int], float]:\n    \"\"\"\
          Match a sentence to start and end timestamps.\"\"\"\n    sentence = sentence.strip()\n\
          \    if not sentence:\n        return None, None, 0.0\n    \n    best_pos,\
          \ similarity = find_best_match(sentence, original_text, search_start)\n\
          \    \n    if similarity < 0.3:\n        return None, None, similarity\n\
          \    \n    alignment = align_characters(sentence, original_text, best_pos)\n\
          \    \n    if not alignment:\n        return None, None, similarity\n  \
          \  \n    first_char_pos = min(alignment.values())\n    last_char_pos = max(alignment.values())\n\
          \    \n    start_ms = char_to_timestamp.get(first_char_pos, (0, 0))[0]\n\
          \    end_ms = char_to_timestamp.get(last_char_pos, (0, 0))[1]\n    \n  \
          \  return start_ms, end_ms, similarity\n\n\ndef main(sentence_output: dict,\
          \ words: Union[str, List]) -> dict:\n    \"\"\"\n    Main function to match\
          \ sentences to timestamps.\n    \n    Args:\n        sentence_output: Structured\
          \ output from sentence_splitter_node with 'sentences' array\n        words:\
          \ JSON string of words array from start_node.words\n    \n    Returns:\n\
          \        Dictionary with 'sentences' array, each containing text, start,\
          \ end, confidence\n    \"\"\"\n    # Parse inputs\n    sentences = sentence_output.get('sentences',\
          \ []) if sentence_output else []\n    \n    # Parse words from JSON string\
          \ if needed\n    if isinstance(words, str):\n        try:\n            words\
          \ = json.loads(words)\n        except:\n            words = []\n    else:\n\
          \        words = words if isinstance(words, list) else []\n    \n    if\
          \ not sentences or not words:\n        return {\"sentences\": []}\n    \n\
          \    # Build character-to-timestamp mapping\n    original_text, char_to_timestamp\
          \ = build_char_to_timestamp_map(words)\n    \n    # Match each sentence\
          \ to timestamps\n    results = []\n    search_start = 0\n    \n    for sentence\
          \ in sentences:\n        start_ms, end_ms, confidence = match_sentence_to_timestamps(\n\
          \            sentence, original_text, char_to_timestamp, search_start\n\
          \        )\n        \n        result = {\n            \"text\": sentence,\n\
          \            \"start\": start_ms,\n            \"end\": end_ms,\n      \
          \      \"confidence\": confidence\n        }\n        results.append(result)\n\
          \        \n        # Update search_start for sequential matching\n     \
          \   if end_ms is not None:\n            for char_idx, (start_ts, end_ts)\
          \ in char_to_timestamp.items():\n                if end_ts >= end_ms:\n\
          \                    search_start = char_idx + 1\n                    break\n\
          \    \n    return {\"sentences\": results}\n"
        code_language: python3
        desc: Match sentences to timestamps using fuzzy character alignment algorithm
        outputs:
          sentences:
            children: null
            type: array[object]
