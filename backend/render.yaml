services:
  # Main FastAPI application
  - type: web
    name: graphfolio-backend
    env: python
    buildCommand: pip install -r requirements.txt && python -m src.database.migrate
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: USE_POSTGRES
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: graphfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: graphfolio-redis
          property: connectionString
      - key: USE_FINMIND
        value: true
        sync: false
      - key: FINMIND_API_KEY
        sync: false
      - key: MASSIVE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://graphfolio.com,https://graphfolio-web-q33ggo2hs-graphfolio.vercel.app
        sync: false

  # Background worker for stock price updates
  - type: worker
    name: graphfolio-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.workers.stock_price_updater
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: USE_POSTGRES
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: graphfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: graphfolio-redis
          property: connectionString
      - key: MASSIVE_API_KEY
        sync: false

  # Redis for caching and pub/sub
  - type: redis
    name: graphfolio-redis
    plan: free
    ipAllowList: []  # Allow all connections

databases:
  - name: graphfolio-db
    databaseName: graphfolio
    user: graphfolio_user
    plan: free
