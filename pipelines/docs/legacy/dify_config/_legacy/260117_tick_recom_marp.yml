            ## Mapping Rules (CRITICAL - MUST FOLLOW EXACTLY)


            **Sentiment Mappings:**

            - BULLISH → Emoji: 🟢, Chinese: "看多"

            - BEARISH → Emoji: 🔴, Chinese: "看空"

            - NEUTRAL → Emoji: 🟡, Chinese: "中性"


            **Time Horizon Mappings:**

            - LONG_TERM → "長期"

            - MEDIUM_TERM → "中期"

            - SHORT_TERM → "短期"


            **Severity Mappings:**

            - LOW → CSS class: "risk-low", Emoji: 🟡, Chinese: "(低)"

            - MEDIUM → CSS class: "risk-medium", Emoji: ⚠️, Chinese: "(中)"

            - HIGH → CSS class: "risk-high", Emoji: 🔴, Chinese: "(高)"

            - CRITICAL → CSS class: "risk-high", Emoji: 🔴, Chinese: "(極高)"


            **Score Ring Class Calculation:**

            - Convert sentiment_score to integer by multiplying by 100 (e.g., 0.85
            → 85)

            - Use class name "score-ring-[integer]" (e.g., "score-ring-85")

            - Common values: score-ring-65, score-ring-70, score-ring-75, score-ring-80,
            score-ring-85


            **Reason Category Emojis (suggested):**

            - MACRO: 🌐

            - MOAT: 🏰

            - OPERATIONAL: ⚙️

            - DEMAND: 📈

            - SUPPLY: 📦

            - VALUATION: 💰

            - TECHNICAL: 📊

            - FUNDAMENTAL: 🎯


            ## Language Requirements


            - ALL content MUST be in Traditional Chinese (繁體中文)

            - Use professional financial terminology

            - Stock tickers: Format as [Display Name](#ticker:SYMBOL)

            - Time references: Format as [#time:milliseconds](#time:milliseconds)

