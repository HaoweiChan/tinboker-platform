# Production environment override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Port: 8000, Domain: api.tinboker.com

services:
  backend:
    image: ghcr.io/haoweichan/tinboker-backend:${IMAGE_TAG:-main}
    container_name: tinboker-backend-prod
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      USE_POSTGRES: "true"
      REDIS_URL: redis://redis:6379/0
      PORT: "8000"
      HOST: 0.0.0.0
      GCP_PROJECT_ID: gen-lang-client-0901363254
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-service-account.json
      GCP_CREDENTIALS_PATH: /app/gcp-service-account.json
      FIRESTORE_DATABASE_ID: graphfolio-db
      # Production CORS - only production frontend
      CORS_ORIGINS: '["https://tinboker.com","https://www.tinboker.com"]'
    volumes:
      - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tinboker-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly no --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:

networks:
  default:
    name: app_default
    external: true
