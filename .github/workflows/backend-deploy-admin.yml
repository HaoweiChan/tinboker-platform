# Admin Dashboard Deployment Workflow

name: Backend Deploy Admin Dashboard

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: admin-latest)'
        required: true
        default: 'admin-latest'
      include_netdata:
        description: 'Include Netdata monitoring container'
        required: true
        type: boolean
        default: true
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: 'production'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: haoweichan/tinboker-backend
  GCP_PROJECT_ID: gen-lang-client-0901363254

jobs:
  build-admin-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image-tag
        run: |
          echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image-tag.outputs.tag }}
            type=sha,prefix=admin-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-admin:
    needs: build-admin-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine deployment config
        id: config
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "port=8000" >> $GITHUB_OUTPUT
            echo "netdata_port=19999" >> $GITHUB_OUTPUT
            echo "api_host=api.tinboker.com" >> $GITHUB_OUTPUT
          else
            echo "compose_file=docker-compose.staging.yml" >> $GITHUB_OUTPUT
            echo "port=8002" >> $GITHUB_OUTPUT
            echo "netdata_port=19998" >> $GITHUB_OUTPUT
            echo "api_host=staging-api.tinboker.com" >> $GITHUB_OUTPUT
          fi
          echo "include_netdata=${{ github.event.inputs.include_netdata }}" >> $GITHUB_OUTPUT

      - name: Fetch secrets from GSM
        run: |
          VPS_HOST=$(gcloud secrets versions access latest --secret=VPS_HOST --project=${{ env.GCP_PROJECT_ID }})
          VPS_USER=$(gcloud secrets versions access latest --secret=VPS_USER --project=${{ env.GCP_PROJECT_ID }})
          VPS_SSH_KEY=$(gcloud secrets versions access latest --secret=VPS_SSH_KEY --project=${{ env.GCP_PROJECT_ID }})
          GHCR_TOKEN=$(gcloud secrets versions access latest --secret=GHCR_TOKEN --project=${{ env.GCP_PROJECT_ID }})
          POSTGRES_PASSWORD=$(gcloud secrets versions access latest --secret=POSTGRES_PASSWORD --project=${{ env.GCP_PROJECT_ID }})
          # Optional — used for the post-deploy Cloudflare edge cache purge.
          CLOUDFLARE_API_TOKEN=$(gcloud secrets versions access latest --secret=CLOUDFLARE_API_TOKEN --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || echo "")
          CLOUDFLARE_ZONE_TAG=$(gcloud secrets versions access latest --secret=CLOUDFLARE_ZONE_TAG --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || echo "")

          echo "::add-mask::$VPS_HOST"
          echo "::add-mask::$VPS_USER"
          echo "::add-mask::$VPS_SSH_KEY"
          echo "::add-mask::$GHCR_TOKEN"
          echo "::add-mask::$POSTGRES_PASSWORD"
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "::add-mask::$CLOUDFLARE_ZONE_TAG"

          echo "VPS_HOST=$VPS_HOST" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "GHCR_TOKEN=$GHCR_TOKEN" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> $GITHUB_ENV
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> $GITHUB_ENV
          echo "CLOUDFLARE_ZONE_TAG=$CLOUDFLARE_ZONE_TAG" >> $GITHUB_ENV
          
          echo "VPS_SSH_KEY<<EOFKEY" >> $GITHUB_ENV
          echo "$VPS_SSH_KEY" >> $GITHUB_ENV
          echo "EOFKEY" >> $GITHUB_ENV

      - name: Deploy Admin Dashboard to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,POSTGRES_PASSWORD
          script: |
            cd /app
            git pull || true

            cd /app/backend

            echo "$GHCR_TOKEN" | docker login ghcr.io -u haoweichan --password-stdin
            docker pull ghcr.io/haoweichan/tinboker-backend:${{ github.event.inputs.image_tag }}

            IMAGE_TAG=${{ github.event.inputs.image_tag }} docker compose -f ${{ steps.config.outputs.compose_file }} up -d backend postgres redis --force-recreate

            if [ "${{ steps.config.outputs.include_netdata }}" == "true" ]; then
              docker compose -f ${{ steps.config.outputs.compose_file }} up -d netdata --force-recreate
              echo "Netdata deployed on port ${{ steps.config.outputs.netdata_port }}"
            fi

            docker exec caddy caddy reload --config /etc/caddy/Caddyfile || true
            docker image prune -f

            for i in $(seq 1 12); do
              curl -sf http://localhost:${{ steps.config.outputs.port }}/health && break
              [ $i -eq 12 ] && { echo "Health check failed after 60s"; exit 1; }
              sleep 5
            done

            if [ "${{ steps.config.outputs.include_netdata }}" == "true" ]; then
              curl -f http://localhost:${{ steps.config.outputs.netdata_port }}/api/v1/info || echo "Netdata health check skipped"
            fi

      # Drop the Cloudflare edge cache once the new container is healthy so the edge
      # re-fetches fresh /api/* instead of serving pre-deploy copies until TTL.
      # Best-effort: a purge failure logs a warning but never fails the deploy.
      - name: Purge Cloudflare CDN cache
        if: success()
        env:
          CF_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_TAG: ${{ env.CLOUDFLARE_ZONE_TAG }}
          API_HOST: ${{ steps.config.outputs.api_host }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_TAG" ]; then
            echo "::warning::Cloudflare credentials missing (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ZONE_TAG in GSM); skipping CDN purge."
            exit 0
          fi
          API_URL="https://api.cloudflare.com/client/v4/zones/${CF_ZONE_TAG}/purge_cache"
          echo "Purging Cloudflare edge cache for host ${API_HOST} ..."
          # Host-scoped purge (matches the manual recipe documented in CLAUDE.md).
          # Purge by host requires an Enterprise plan; on other plans Cloudflare
          # returns success:false and we fall back to purging the whole zone.
          RESP=$(curl -sS -X POST "$API_URL" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"hosts\":[\"${API_HOST}\"]}" || true)
          if echo "$RESP" | grep -Eq '"success":[[:space:]]*true'; then
            echo "✅ Edge cache purged for host ${API_HOST}"
            exit 0
          fi
          echo "::warning::Host-scoped purge unavailable (likely non-Enterprise plan); falling back to purge_everything. Response: ${RESP:-<none>}"
          RESP2=$(curl -sS -X POST "$API_URL" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || true)
          if echo "$RESP2" | grep -Eq '"success":[[:space:]]*true'; then
            echo "✅ Purged entire zone cache."
          else
            echo "::warning::Cloudflare cache purge failed; edge may serve stale /api/* until TTL. Response: ${RESP2:-<none>}"
          fi

      - name: Deployment summary
        run: |
          echo "## 🚀 Admin Dashboard Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ github.event.inputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Port | ${{ steps.config.outputs.port }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Netdata Enabled | ${{ steps.config.outputs.include_netdata }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access" >> $GITHUB_STEP_SUMMARY
          echo "- Admin Dashboard: \`https://api.tinboker.com/admin\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.config.outputs.include_netdata }}" == "true" ]; then
            echo "- Netdata Monitor: \`https://api.tinboker.com/netdata/\`" >> $GITHUB_STEP_SUMMARY
          fi
