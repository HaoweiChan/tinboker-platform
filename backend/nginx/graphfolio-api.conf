# Nginx configuration for TinBoker Backend multi-environment routing
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled
# Then run: certbot --nginx -d api.tinboker.com -d dev-api.tinboker.com -d staging-api.tinboker.com

# Production API - api.tinboker.com -> port 8000
server {
    listen 80;
    listen [::]:80;
    server_name api.tinboker.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

