    - data:
        code: "import json\nimport requests\n\ndef main(marp_writer_output: dict)\
          \ -> dict:\n    # Initialize Marp markdown content with front matter\n \
          \   marp_parts = [\n        '---',\n        'marp: true',\n        'theme:\
          \ default',\n        'paginate: false',\n        'size: 1080x1080', \n  \
          \      'header: \"\"',\n        'footer: \"\"',\n        '---',\n      \
          \  '',\n        '<style>',\n        'section {',\n        '  padding-bottom:\
          \ 3rem !important;',\n        '}',\n        'ul, ol {',\n        '  margin-bottom:\
          \ 1.5rem !important;',\n        '}',\n        'p:last-child, li:last-child\
          \ {',\n        '  margin-bottom: 2rem !important;',\n        '}',\n    \
          \    '</style>',\n        ''\n    ]\n    \n    # Default filename\n    filename\
          \ = 'ticker_recommendations.pptx'\n    \n    # Generate filename from title if available\n\
          \    if marp_writer_output and 'title' in marp_writer_output:\n        title = marp_writer_output['title']\n\
          \        safe_title = \"\".join([c for c in title if c.isalnum() or c in (' ', '-', '_')]).strip()\n\
          \        if safe_title:\n            filename = f\"{safe_title}.pptx\"\n\
          \    \n    # Process slides (first slide should be the summary table)\n    if marp_writer_output and 'slides' in marp_writer_output\
          \ and isinstance(marp_writer_output['slides'], list):\n        for slide\
          \ in marp_writer_output['slides']:\n            # Check if slide has pre-formatted\
          \ content (new format with CSS)\n            if 'content' in slide and slide['content']:\n\
          \                # Use the full formatted content\n                marp_parts.append(slide['content'])\n\
          \                marp_parts.append('')\n                \n             \
          \   # Add time stamp as HTML comment if available\n                if 'start_time'\
          \ in slide and slide['start_time'] is not None:\n                    marp_parts.append(f\"\
          <!-- #time:{slide['start_time']} -->\")\n                    marp_parts.append('')\n\
          \                \n                # Add speaker notes as HTML comment if\
          \ available\n                if 'slide_notes' in slide and slide['slide_notes']:\n\
          \                    marp_parts.append(f\"<!-- Notes: {slide['slide_notes']}\
          \ -->\")\n                    marp_parts.append('')\n            \n    \
          \        # Add slide separator\n            marp_parts.append('---')\n \
          \           marp_parts.append('')\n    \n    # Join all parts to create\
          \ Marp markdown\n    marp_markdown = '\\n'.join(marp_parts)\n    \n    #\
          \ Call Flask service to convert to PPTX\n    try:\n        response = requests.post(\n\
          \            'http://marp-flask-service:5004/convert',\n            json={'markdown':\
          \ marp_markdown},\n            timeout=60\n        )\n        \n       \
          \ if response.status_code == 200:\n            result = response.json()\n\
          \            if result.get('success'):\n                return {\n     \
          \               'marp_markdown': marp_markdown,\n                    'pptx_base64':\
          \ result.get('pptx_base64', ''),\n                    'filename': result.get('filename',\
          \ filename),\n                    'conversion_status': 'success'\n     \
          \           }\n            else:\n                return {\n           \
          \         'marp_markdown': marp_markdown,\n                    'pptx_base64':\
          \ '',\n                    'filename': filename,\n                    'conversion_status':\
          \ f\"error: {result.get('error', 'unknown error')}\"\n                }\n\
          \        else:\n            return {\n                'marp_markdown': marp_markdown,\n\
          \                'pptx_base64': '',\n                'filename': filename,\n\
          \                'conversion_status': f'error: HTTP {response.status_code}'\n\
          \            }\n    except Exception as e:\n        return {\n         \
          \   'marp_markdown': marp_markdown,\n            'pptx_base64': '',\n  \
          \          'filename': filename,\n            'conversion_status': f'error:\
          \ {str(e)}'\n        }"
