        desc: ''
        model:
          completion_params: {}
          mode: chat
          name: gemini-3-flash-preview
          provider: langgenius/gemini/google
        prompt_template:
        - id: extractor-system
          role: system
          text: 'You are an event extraction agent analyzing podcast transcripts that
            have been segmented into sentences.


            Your task:

            1. Analyze the sentences array and identify all distinct topics/sections
            discussed

            2. For each topic, identify the range of sentence indices (start_index
            to end_index) that cover that topic

            3. Extract ALL topics discussed, including both financial and non-financial
            content (e.g., "業配營養品", "分享去德國玩的心得", "台積電目前情況", "AI 記憶體/散熱供應鏈")


            Rules:

            - Identify all topics discussed in the transcript, not just financial
            ones

            - Each topic should be a discrete section with a clear theme

            - section_topic should be a descriptive topic name in Traditional Chinese

            - start_index and end_index should be the sentence indices (0-based) that
            cover this topic

            - The ranges should cover ALL sentences with no gaps - every sentence
            index should be included in at least one event

            - Ranges can overlap if a sentence discusses multiple topics

            - Err on the side of more granular topics rather than combining multiple
            distinct topics

            - Never invent facts not present in the transcript

            '
        - id: 97e66c56-f630-4892-92cd-68ca7c7dd89a
          role: user
          text: 'Analyze the sentences array and extract all topics/sections discussed.


            Source: {{#start_node.source#}}

            Episode Title: {{#start_node.episode_title#}}


            Sentences Array:

            {{#start_node.sentences#}}


            For each topic/section, identify:

            - start_index: The starting sentence index (0-based) for this topic

            - end_index: The ending sentence index (inclusive) for this topic

            - section_topic: A descriptive topic name in Traditional Chinese (e.g.,
            "業配營養品", "台積電目前情況，以及股癌針對目前狀況的投資策略", "AI 記憶體/散熱供應鏈 目前狀況")


            Ensure that all sentence indices are covered by at least one event. Topics
            can include both financial and non-financial content.

            '
        selected: false
        structured_output:
          schema:
            properties:
              events:
                items:
                  properties:
                    end_index:
                      description: Ending sentence index (inclusive) for this topic
                      type: integer
                    section_topic:
                      description: Descriptive topic name in Traditional Chinese
                      type: string
                    start_index:
                      description: Starting sentence index (0-based) for this topic
                      type: integer
                  required:
                  - start_index
                  - end_index
                  - section_topic
                  type: object
                type: array
            required:
            - events
            type: object
        structured_output_enabled: true
        title: Event_extractor
        type: llm
        variables: []
        vision:
          enabled: false
      height: 87
      id: extractor_node
      position:
        x: 157.3385256768819
        y: 260.7435393830164
      positionAbsolute:
        x: 157.3385256768819
        y: 260.7435393830164
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef main(event_extractor_output: dict, sentences: str)\
          \ -> dict:\n    # Parse sentences JSON string\n    try:\n        sentences_list\
          \ = json.loads(sentences) if isinstance(sentences, str) else sentences\n\
          \    except (json.JSONDecodeError, TypeError):\n        sentences_list =\
          \ []\n    \n    # Parse event extractor output\n    if not event_extractor_output\
          \ or 'events' not in event_extractor_output:\n        return {'events_markdown':\
          \ '# Events List\\n\\nNo events found.'}\n    \n    events = event_extractor_output.get('events',\
          \ [])\n    \n    # Build markdown content\n    markdown_parts = ['# Events\
          \ List', '']\n    \n    for event in events:\n        start_index = event.get('start_index',\
          \ 0)\n        end_index = event.get('end_index', 0)\n        section_topic\
          \ = event.get('section_topic', 'Untitled Event')\n        \n        # Get\
          \ start time from sentences array using start_index\n        start_time\
          \ = None\n        if start_index < len(sentences_list):\n            sentence\
          \ = sentences_list[start_index]\n            if 'start' in sentence:\n \
          \               start_time = sentence.get('start')\n        \n        #\
          \ Format event entry with H2 heading and time tag (matching summary markdown\
          \ format)\n        if start_time is not None:\n            markdown_parts.append(f'##\
          \ {section_topic} (#time:{start_time})')\n        else:\n            markdown_parts.append(f'##\
          \ {section_topic}')\n        markdown_parts.append(f'  - Indices: {start_index}-{end_index}')\n\
          \        markdown_parts.append('')\n    \n    # Join all parts\n    events_markdown\
          \ = '\\n'.join(markdown_parts)\n    \n    return {'events_markdown': events_markdown}"
        code_language: python3
        desc: ''
        outputs:
          events_markdown:
            children: null
            type: string
        selected: false
        title: Events to Markdown
        type: code
        variables:
        - value_selector:
          - extractor_node
          - structured_output
          value_type: object
          variable: event_extractor_output
        - value_selector:
          - start_node
          - sentences
          value_type: string
          variable: sentences
      height: 51
      id: events_to_markdown_node
      position:
        x: 750.4478642893494
        y: 128.01790880418105
      positionAbsolute:
        x: 750.4478642893494
        y: 128.01790880418105
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef main(event_extractor_output: dict, sentences: str)\
          \ -> dict:\n    # Parse sentences JSON string\n    try:\n        sentences_list\
          \ = json.loads(sentences) if isinstance(sentences, str) else sentences\n\
          \    except (json.JSONDecodeError, TypeError):\n        sentences_list =\
          \ []\n    \n    # Parse event extractor output\n    if not event_extractor_output\
          \ or 'events' not in event_extractor_output:\n        return {'events':\
          \ []}\n    \n    events = event_extractor_output.get('events', [])\n   \
          \ \n    # Financial/market keywords to filter events\n    financial_keywords\
          \ = [\n        '台積電', 'TSMC', '股價', '股票', '投資', '市場', '財經', '營收', '獲利',\n\
          \        '半導體', 'AI', '記憶體', '散熱', '供應鏈', '多頭', '空頭', '買進', '賣出',\n    \
          \    '財報', '季報', '年報', 'EPS', '本益比', '殖利率', '股息', '股利',\n        '指數', '大盤',\
          \ '個股', 'ETF', '基金', '債券', '匯率', '利率',\n        '經濟', 'GDP', '通膨', '通縮',\
          \ '央行', '聯準會', 'FED',\n        '科技股', '金融股', '傳產', '電子', '傳產股', '金融',\n\
          \        '策略', '分析', '預測', '展望', '趨勢', '行情'\n    ]\n    \n    clustered_events\
          \ = []\n    \n    for event in events:\n        start_index = event.get('start_index',\
          \ 0)\n        end_index = event.get('end_index', 0)\n        section_topic\
          \ = event.get('section_topic', '')\n        \n        # Filter for financial/market-relevant\
          \ topics\n        is_financial = any(keyword in section_topic for keyword\
          \ in financial_keywords)\n        \n        if not is_financial:\n     \
          \       continue\n        \n        # Collect sentences in the range [start_index,\
          \ end_index]\n        event_sentences = []\n        start_time = None\n\
          \        end_time = None\n        \n        for i in range(start_index,\
          \ end_index + 1):\n            if i < len(sentences_list):\n           \
          \     sentence = sentences_list[i]\n                event_sentences.append(sentence)\n\
          \                \n                # Get start time from first sentence\n\
          \                if start_time is None and 'start' in sentence:\n      \
          \              start_time = sentence.get('start')\n                \n  \
          \              # Update end time from last sentence\n                if\
          \ 'end' in sentence:\n                    end_time = sentence.get('end')\n\
          \        \n        # Only add event if we have sentences and times\n   \
          \     if event_sentences and start_time is not None and end_time is not\
          \ None:\n            clustered_events.append({\n                'section_topic':\
          \ section_topic,\n                'sentences': event_sentences,\n      \
          \          'start': start_time,\n                'end': end_time\n     \
          \       })\n    \n    return {'events': clustered_events}"
        code_language: python3
        desc: ''
        outputs:
          events:
            children: null
            type: array[object]
        selected: false
        title: Sentence Clusterer
        type: code
        variables:
        - value_selector:
          - extractor_node
          - structured_output
          value_type: object
          variable: event_extractor_output
        - value_selector:
          - start_node
          - sentences
          value_type: string
          variable: sentences
      height: 51
      id: sentence_clusterer_node
      position:
        x: 445.99242050717874
        y: 299.6555055823876
      positionAbsolute:
        x: 445.99242050717874
        y: 299.6555055823876
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: ''
        model:
          completion_params: {}
          mode: chat
          name: gemini-3-flash-preview
          provider: langgenius/gemini/google
        prompt_template:
        - id: writer-system
          role: system
          text: 'You are a financial writer agent generating Traditional Chinese (繁體中文)
            content for financial news articles.


            Content Guidelines:

            1. Language: ALL content MUST be in Traditional Chinese (繁體中文)

            2. Financial Focus: Include ONLY financial news, market analysis, earnings
            reports, and economic indicators

            3. Discard: Exclude celebrity gossip, political drama (unless market-impacting),
            sports, lifestyle news

            4. Professional Terminology: Use proper financial terms (e.g., "多頭", "營收",
            "股價")


            Format Requirements:

            - Use proper Markdown structure with ## for main sections, ### for subsections

            - Stock tickers: Format as [Display Name](#ticker:SYMBOL) - e.g., [台積電](#ticker:2330)

            - Tags: Format as [Tag Name](#tag:TAG_NAME) - e.g., [半導體](#tag:Semiconductor)

            - Use **bold** for emphasis, *italics* for quotes

            - Use bullet points or numbered lists for key information

            - Use blockquotes (>) for direct quotes from earnings calls or analyst
            comments


            Structure:

            - Title (H1 equivalent)

            - Executive Summary (2-3 sentences)

            - Key Events (one subsection per event)

            - Analysis and Implications

            - Conclusion


            SEO Best Practices:

            - Include primary keywords in first paragraph

            - Use semantic keywords throughout

            - Keep paragraphs concise (3-5 sentences)

            - Use proper heading hierarchy (don''t skip levels)

            '
        - id: c0070a0c-772e-40df-b1ef-5f0f2b5e6f1c
          role: user
          text: "Generate a Traditional Chinese financial news article from the following\
            \ clustered events:\n\nEvents:\n{{#sentence_clusterer_node.events#}}\n\
            \nSource: {{#start_node.source#}}\nEpisode Title: {{#start_node.episode_title#}}\n\
            \nRequirements:\n- Language: Traditional Chinese (繁體中文)\n- Target length:\
            \ 800-1000 words\n- Tone: Professional, investor-facing\n- Include stock\
            \ ticker links where companies are mentioned using format [Display Name](#ticker:SYMBOL)\n\
            - Include topic tags where relevant using format [Tag Name](#tag:TAG_NAME)\n\
            - Focus ONLY on financial/market content\n- For each event section, use\
            \ the section_topic as the heading and include the start time when available\n\
            \nOutput a structured JSON object with the following fields:\n- title:\
            \ Article title in Traditional Chinese\n- executive_summary: 2-3 sentence\
            \ summary in Traditional Chinese\n- sections: Array of section objects,\
            \ each with:\n  - heading: Section heading (H2 level) - should match the\
            \ event's section_topic\n  - content: Section content in Markdown format\
            \ with proper formatting\n  - start_time: Start time in milliseconds (from\
            \ event.start) - include this when available\n  - subsections: Optional\
            \ array of subsection objects with heading and content\n- conclusion:\
            \ Conclusion paragraph in Traditional Chinese\n- stock_tickers: Array\
            \ of stock ticker objects with display_name and symbol\n- tags: Array\
            \ of tag objects with display_name and tag_name\n"
        selected: false
        structured_output:
          schema:
            properties:
              conclusion:
                description: Conclusion paragraph in Traditional Chinese
                type: string
              executive_summary:
                description: 2-3 sentence executive summary in Traditional Chinese
                type: string
              sections:
                items:
                  properties:
                    content:
                      description: Section content in Markdown format
                      type: string
                    heading:
                      description: Section heading (H2 level)
                      type: string
                    start_time:
                      description: Start time in milliseconds (optional, include when
                        available from event)
                      type: integer
                    subsections:
                      items:
                        properties:
                          content:
                            description: Subsection content in Markdown format
                            type: string
                          heading:
                            description: Subsection heading (H3 level)
                            type: string
                        required:
                        - heading
                        - content
                        type: object
                      type: array
                  required:
                  - heading
                  - content
                  type: object
                type: array
              stock_tickers:
                items:
                  properties:
                    display_name:
                      type: string
                    symbol:
                      type: string
                  required:
                  - display_name
                  - symbol
                  type: object
                type: array
              tags:
                items:
                  properties:
                    display_name:
                      type: string
                    tag_name:
                      type: string
                  required:
                  - display_name
                  - tag_name
                  type: object
                type: array
              title:
                description: Article title in Traditional Chinese
                type: string
            required:
            - title
            - executive_summary
            - sections
            - conclusion
            type: object
        structured_output_enabled: true
        title: Writer
        type: llm
        variables: []
        vision:
          enabled: false
      height: 87
      id: writer_node
      position:
        x: 750.4478642893494
        y: 299.6555055823876
      positionAbsolute:
        x: 750.4478642893494
        y: 299.6555055823876
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef main(writer_output: dict) -> dict:\n    # Initialize\
          \ markdown content\n    markdown_parts = []\n\n    # Add title (H1)\n  \
          \  if writer_output and 'title' in writer_output and writer_output['title']:\n\
          \        markdown_parts.append(f\"# {writer_output['title']}\\n\")\n\n \
          \   # Add executive summary\n    if writer_output and 'executive_summary'\
          \ in writer_output and writer_output['executive_summary']:\n        markdown_parts.append(f\"\
          {writer_output['executive_summary']}\\n\")\n\n    # Process sections\n \
          \   if writer_output and 'sections' in writer_output and isinstance(writer_output['sections'],\
          \ list):\n        for section in writer_output['sections']:\n          \
          \  # Add section heading (H2) with time stamp if available\n           \
          \ heading = section.get('heading', '')\n            start_time = section.get('start_time')\n\
          \            \n            # Add heading with timestamp\n            if\
          \ heading:\n                if start_time is not None:\n               \
          \     markdown_parts.append(f\"## {heading} (#time:{start_time})\\n\")\n\
          \                else:\n                    markdown_parts.append(f\"##\
          \ {heading}\\n\")\n            \n            # Add section content (without\
          \ heading since we added it above)\n            if 'content' in section\
          \ and section['content']:\n                # Skip content if it starts with\
          \ the same heading to avoid duplication\n                content = section['content']\n\
          \                if content.strip().startswith(f\"## {heading}\"):\n   \
          \                 # Content includes heading, skip the heading line\n  \
          \                  lines = content.split('\\n', 1)\n                   \
          \ if len(lines) > 1:\n                        markdown_parts.append(f\"\
          {lines[1]}\\n\")\n                else:\n                    markdown_parts.append(f\"\
          {content}\\n\")\n            \n            # Process subsections\n     \
          \       if 'subsections' in section and isinstance(section['subsections'],\
          \ list):\n                for subsection in section['subsections']:\n  \
          \                  # Add subsection heading (H3)\n                    if\
          \ 'heading' in subsection:\n                        markdown_parts.append(f\"\
          ### {subsection['heading']}\\n\")\n                    \n              \
          \      # Add subsection content\n                    if 'content' in subsection\
          \ and subsection['content']:\n                        markdown_parts.append(f\"\
          {subsection['content']}\\n\")\n\n    # Add conclusion\n    if writer_output\
          \ and 'conclusion' in writer_output and writer_output['conclusion']:\n \
          \       markdown_parts.append(f\"## 結論\\n\\n{writer_output['conclusion']}\\\
          n\")\n\n    # Join all parts\n    markdown_output = \"\\n\".join(markdown_parts)\n\
          \n    # Return the result as a dictionary\n    return {\n        \"result\"\
          : markdown_output\n    }"
        code_language: python3
        desc: ''
        outputs:
          result:
            children: null
            type: string
        selected: false
        title: Markdown Transform
        type: code
        variables:
        - value_selector:
          - writer_node
          - structured_output
          value_type: object
          variable: writer_output
