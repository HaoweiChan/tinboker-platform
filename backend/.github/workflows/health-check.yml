# Production Health Check and Auto-Recovery
# Checks API health every 10 minutes and restarts if unhealthy

name: Health Check

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Allow manual trigger

env:
  API_URL: https://api.tinboker.com/health
  STAGING_API_URL: https://staging-api.tinboker.com/health
  DEV_API_URL: https://dev-api.tinboker.com/health

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check Production API Health
        id: prod-health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ env.API_URL }}" || echo "000")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Production API is healthy"
          else
            echo "Production API unhealthy (HTTP $HTTP_CODE)"
          fi

      - name: Check Staging API Health
        id: staging-health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ env.STAGING_API_URL }}" || echo "000")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Staging API is healthy"
          else
            echo "Staging API unhealthy (HTTP $HTTP_CODE)"
          fi

      - name: Check Dev API Health
        id: dev-health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ env.DEV_API_URL }}" || echo "000")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Dev API is healthy"
          else
            echo "Dev API unhealthy (HTTP $HTTP_CODE)"
          fi

      - name: Authenticate to Google Cloud
        if: steps.prod-health.outputs.http_code != '200' || steps.staging-health.outputs.http_code != '200' || steps.dev-health.outputs.http_code != '200'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.prod-health.outputs.http_code != '200' || steps.staging-health.outputs.http_code != '200' || steps.dev-health.outputs.http_code != '200'
        uses: google-github-actions/setup-gcloud@v2

      - name: Check VPS Secrets Configured
        id: check-secrets
        if: steps.prod-health.outputs.http_code != '200' || steps.staging-health.outputs.http_code != '200' || steps.dev-health.outputs.http_code != '200'
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "::error::VPS_HOST secret is not configured. Please add VPS_HOST to repository secrets."
            echo "configured=false" >> $GITHUB_OUTPUT
          elif [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::VPS_SSH_KEY secret is not configured. Please add VPS_SSH_KEY to repository secrets."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Restart Unhealthy Services
        if: (steps.prod-health.outputs.http_code != '200' || steps.staging-health.outputs.http_code != '200' || steps.dev-health.outputs.http_code != '200') && steps.check-secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app
            
            # Restart production if unhealthy
            if [ "${{ steps.prod-health.outputs.http_code }}" != "200" ]; then
              echo "Restarting production..."
              docker compose -f docker-compose.multi.yml pull backend-prod
              docker compose -f docker-compose.multi.yml up -d --no-deps backend-prod
            fi
            
            # Restart staging if unhealthy
            if [ "${{ steps.staging-health.outputs.http_code }}" != "200" ]; then
              echo "Restarting staging..."
              docker compose -f docker-compose.multi.yml pull backend-staging
              docker compose -f docker-compose.multi.yml up -d --no-deps backend-staging
            fi
            
            # Restart dev if unhealthy
            if [ "${{ steps.dev-health.outputs.http_code }}" != "200" ]; then
              echo "Restarting dev..."
              docker compose -f docker-compose.multi.yml pull backend-dev
              docker compose -f docker-compose.multi.yml up -d --no-deps backend-dev
            fi
            
            # Wait for containers to start
            sleep 15
            
            # Verify health
            echo "=== Verification ==="
            curl -s http://localhost:8000/health || echo "Production still unhealthy"
            curl -s http://localhost:8001/health || echo "Dev still unhealthy"
            curl -s http://localhost:8002/health || echo "Staging still unhealthy"

      - name: Summary
        run: |
          echo "## Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | HTTP Code |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Production | $( [ '${{ steps.prod-health.outputs.http_code }}' = '200' ] && echo '✅ Healthy' || echo '❌ Unhealthy' ) | ${{ steps.prod-health.outputs.http_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | $( [ '${{ steps.staging-health.outputs.http_code }}' = '200' ] && echo '✅ Healthy' || echo '❌ Unhealthy' ) | ${{ steps.staging-health.outputs.http_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dev | $( [ '${{ steps.dev-health.outputs.http_code }}' = '200' ] && echo '✅ Healthy' || echo '❌ Unhealthy' ) | ${{ steps.dev-health.outputs.http_code }} |" >> $GITHUB_STEP_SUMMARY
