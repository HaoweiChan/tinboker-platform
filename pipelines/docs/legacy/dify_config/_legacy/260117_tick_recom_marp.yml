            \ BEARISH→🔴 看空, NEUTRAL→🟡 中性\n   - Time Horizon: LONG_TERM→長期, MEDIUM_TERM→\
            中期, SHORT_TERM→短期\n   - Severity: LOW→risk-low/🟡/(低), MEDIUM→risk-medium/⚠\
