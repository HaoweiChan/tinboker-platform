[pytest]
# Pytest configuration for Graphfolio Backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Markers
markers =
    asyncio: mark test as async
    integration: mark test as integration test
    slow: mark test as slow running
    requires_api: mark test as requiring external API

# Output options
console_output_style = progress
addopts = 
    -ra
    --showlocals

# Warnings
filterwarnings =
    ignore::DeprecationWarning

# Coverage (when using pytest-cov)
[coverage:run]
source = src/
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
