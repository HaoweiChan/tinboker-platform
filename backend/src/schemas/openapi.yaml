openapi: 3.1.0
info:
  title: Graphfolio Backend API
  description: Backend API for Graphfolio - Company network visualization
  version: 1.0.0
servers:
- url: https://api.tinboker.com
  description: Production server
- url: https://staging-api.tinboker.com
  description: Staging server
- url: https://dev-api.tinboker.com
  description: Development server
- url: http://localhost:8000
  description: Local development
paths:
  /api/graphs:
    get:
      tags:
      - graphs
      summary: Get Sorted Graphs
      description: 'Get sorted graphs list


        Query params:

        - sort_by: Sort field (concept_id, created_at, updated_at)'
      operationId: get_sorted_graphs_api_graphs_get
      parameters:
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          default: concept_id
          title: Sort By
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                title: Response Get Sorted Graphs Api Graphs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - graphs
      summary: Create Graph
      description: 'Create new graph


        Creates a graph with nodes and edges. Stock information will be fetched for
        nodes.'
      operationId: create_graph_api_graphs_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/graphs/{graph_id}:
    get:
      tags:
      - graphs
      summary: Get Graph By Id
      description: 'Get graph by ID


        Returns complete graph with nodes and edges'
      operationId: get_graph_by_id_api_graphs__graph_id__get
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          description: Graph ID
          title: Graph Id
        description: Graph ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphData'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - graphs
      summary: Delete Graph
      description: 'Delete graph


        Deletes graph and all its nodes and edges'
      operationId: delete_graph_api_graphs__graph_id__delete
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          description: Graph ID
          title: Graph Id
        description: Graph ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/graphs/{graph_id}/nodes/{node_id}:
    put:
      tags:
      - graphs
      summary: Modify Node
      description: 'Modify node in graph


        Updates node position and/or data'
      operationId: modify_node_api_graphs__graph_id__nodes__node_id__put
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          description: Graph ID
          title: Graph Id
        description: Graph ID
      - name: node_id
        in: path
        required: true
        schema:
          type: string
          description: Node ID
          title: Node Id
        description: Node ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - graphs
      summary: Delete Node
      description: 'Delete node from graph


        Deletes node and all connected edges'
      operationId: delete_node_api_graphs__graph_id__nodes__node_id__delete
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          description: Graph ID
          title: Graph Id
        description: Graph ID
      - name: node_id
        in: path
        required: true
        schema:
          type: string
          description: Node ID
          title: Node Id
        description: Node ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/graphs/{graph_id}/edges/{edge_id}:
    put:
      tags:
      - graphs
      summary: Modify Edge
      description: 'Modify edge in graph


        Updates edge data'
      operationId: modify_edge_api_graphs__graph_id__edges__edge_id__put
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          description: Graph ID
          title: Graph Id
        description: Graph ID
      - name: edge_id
        in: path
        required: true
        schema:
          type: string
          description: Edge ID
          title: Edge Id
        description: Edge ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EdgeUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - graphs
      summary: Delete Edge
      description: Delete edge from graph
      operationId: delete_edge_api_graphs__graph_id__edges__edge_id__delete
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          description: Graph ID
          title: Graph Id
        description: Graph ID
      - name: edge_id
        in: path
        required: true
        schema:
          type: string
          description: Edge ID
          title: Edge Id
        description: Edge ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/stocks:
    get:
      tags:
      - stocks
      summary: Get Sorted Stocks
      description: 'Get sorted stocks list with optional search


        Query params:

        - sort_by: Sort field (ticker, name, price, change_percent, market_cap)

        - limit: Maximum number of stocks to return (default: 50, max: 200)

        - q: Optional search query to filter by ticker or name (case-insensitive)'
      operationId: get_sorted_stocks_api_stocks_get
      parameters:
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          description: Sort field
          default: ticker
          title: Sort By
        description: Sort field
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Maximum number of stocks to return (1-200)
          default: 50
          title: Limit
        description: Maximum number of stocks to return (1-200)
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search query (filters by ticker or name)
          title: Q
        description: Search query (filters by ticker or name)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                title: Response Get Sorted Stocks Api Stocks Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/stocks/{ticker}:
    get:
      tags:
      - stocks
      summary: Get Stock By Ticker
      description: "Get stock by ticker\n\nReturns full stock information including\
        \ chart data filtered by timeframe.\n\nQuery Parameters:\n- timeframe: Optional\
        \ timeframe filter. Valid options:\n  - 1H: Last 1 hour (limited data availability\
        \ with daily aggregates)\n  - 1D: Last 24 hours\n  - 1W: Last 7 days\n  -\
        \ 1M: Last 30 days\n  - 3M: Last 90 days\n  - 6M: Last 180 days\n  - 1Y: Last\
        \ 365 days\n  - YTD: Year to date (from January 1st)\n  - ALL: All available\
        \ data (default if not specified)\n- before: Optional Unix timestamp (ms).\
        \ Fetch historical data ending before this time.\n  Used for infinite scroll\
        \ / lazy loading of older data."
      operationId: get_stock_by_ticker_api_stocks__ticker__get
      parameters:
      - name: ticker
        in: path
        required: true
        schema:
          type: string
          title: Ticker
      - name: timeframe
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(1H|1D|1W|1M|3M|6M|1Y|YTD|ALL)$
          - type: 'null'
          description: 'Timeframe filter: 1H, 1D, 1W, 1M, 3M, 6M, 1Y, YTD, ALL'
          title: Timeframe
        description: 'Timeframe filter: 1H, 1D, 1W, 1M, 3M, 6M, 1Y, YTD, ALL'
      - name: before
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Fetch data before this Unix timestamp (ms) for infinite scroll
          title: Before
        description: Fetch data before this Unix timestamp (ms) for infinite scroll
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/stocks/{ticker}/basic:
    get:
      tags:
      - stocks
      summary: Get Stock Basic Info
      description: Get basic stock information only (no chart data)
      operationId: get_stock_basic_info_api_stocks__ticker__basic_get
      parameters:
      - name: ticker
        in: path
        required: true
        schema:
          type: string
          title: Ticker
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/stocks/{ticker}/history:
    get:
      tags:
      - stocks
      summary: Get Stock History
      description: "Get stock price history for sparklines\n\nReturns lightweight\
        \ price history data extracted from chart data.\n\nQuery Parameters:\n- timeframe:\
        \ Optional timeframe filter. Valid options:\n  - 1H: Last 1 hour\n  - 1D:\
        \ Last 24 hours\n  - 1W: Last 7 days\n  - 1M: Last 30 days\n  - 3M: Last 90\
        \ days\n  - 6M: Last 180 days\n  - 1Y: Last 365 days\n  - YTD: Year to date\n\
        \  - ALL: All available data (default)"
      operationId: get_stock_history_api_stocks__ticker__history_get
      parameters:
      - name: ticker
        in: path
        required: true
        schema:
          type: string
          title: Ticker
      - name: timeframe
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(1H|1D|1W|1M|3M|6M|1Y|YTD|ALL)$
          - type: 'null'
          description: 'Timeframe filter: 1H, 1D, 1W, 1M, 3M, 6M, 1Y, YTD, ALL'
          title: Timeframe
        description: 'Timeframe filter: 1H, 1D, 1W, 1M, 3M, 6M, 1Y, YTD, ALL'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/content/index:
    get:
      tags:
      - content
      summary: List Content
      operationId: list_content_api_content_index_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/content/{ticker}:
    get:
      tags:
      - content
      summary: Get Ticker Content
      operationId: get_ticker_content_api_content__ticker__get
      parameters:
      - name: ticker
        in: path
        required: true
        schema:
          type: string
          title: Ticker
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/news:
    get:
      tags:
      - news
      summary: Get Sorted News
      description: 'Get sorted news list


        Query params:

        - sort_by: Sort field (date, created_at, updated_at, title)


        CDN Cache: 10 minutes'
      operationId: get_sorted_news_api_news_get
      parameters:
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          description: Sort field
          default: date
          title: Sort By
        description: Sort field
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockEvent'
                title: Response Get Sorted News Api News Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/news/{news_id}:
    get:
      tags:
      - news
      summary: Get News By Id
      description: 'Get news by ID


        Returns complete news event with related tickers


        CDN Cache: 10 minutes'
      operationId: get_news_by_id_api_news__news_id__get
      parameters:
      - name: news_id
        in: path
        required: true
        schema:
          type: string
          description: News ID
          title: News Id
        description: News ID
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockEvent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/news/fetch/{ticker}:
    post:
      tags:
      - news
      summary: Fetch News From Massive
      description: "Fetch news from Massive API for a ticker and save to database\n\
        \nArgs:\n    ticker: Stock ticker symbol (e.g., \"NVDA\", \"AAPL\")\n    limit:\
        \ Maximum number of articles to fetch (default: 10)\n    \nReturns:\n    Dict\
        \ with count of news articles fetched and their IDs"
      operationId: fetch_news_from_massive_api_news_fetch__ticker__post
      parameters:
      - name: ticker
        in: path
        required: true
        schema:
          type: string
          description: Stock ticker symbol
          title: Ticker
        description: Stock ticker symbol
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          description: Maximum number of articles to fetch
          default: 10
          title: Limit
        description: Maximum number of articles to fetch
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Fetch News From Massive Api News Fetch  Ticker  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/visuals/supply-chain:
    get:
      tags:
      - visuals
      summary: Get Supply Chain
      description: 'Get supply chain visualization graph


        Returns layered supply chain visualization graph data with real financial
        data'
      operationId: get_supply_chain_api_visuals_supply_chain_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/visuals/ownership:
    get:
      tags:
      - visuals
      summary: Get Ownership
      description: 'Get ownership tree visualization graph


        Returns hierarchical ownership visualization data with real financial data'
      operationId: get_ownership_api_visuals_ownership_get
      responses:
