# Multi-environment deployment workflow
# - PR to develop/main: Build image, comment on PR
# - Push to develop: Deploy to dev environment (port 8001)
# - Push to main: Deploy to production (port 8000)
# - Manual trigger: Build and/or deploy to staging (port 8002)

name: Build & Deploy

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy to staging'
        required: true
        default: 'latest'
      build_image:
        description: 'Build image from branch before deploying'
        required: true
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: graphfolio/graphfolio-backend
  GCP_PROJECT_ID: gen-lang-client-0901363254

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      id-token: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: image-tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image-tag.outputs.tag }}
            type=sha,prefix=

      - name: Build and push Docker image
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_image == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on PR with image info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const imageTag = '${{ steps.image-tag.outputs.tag }}';
            const imageName = 'ghcr.io/graphfolio/graphfolio-backend:' + imageTag;
            const body = [
              '## Docker Image Built',
              '',
              '**Image:** `' + imageName + '`',
              '',
              '### Deploy to staging for testing:',
              'Go to Actions > Build & Deploy > Run workflow',
              'Select your branch and enter image tag: `' + imageTag + '`',
              '',
              '### Or manually deploy:',
              '```bash',
              'ssh root@VPS "cd /app && IMAGE_TAG=' + imageTag + ' docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d"',
              '```'
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine deployment environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "service=backend-staging" >> $GITHUB_OUTPUT
            echo "port=8002" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "image_var=STAGING_IMAGE_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "service=backend-prod" >> $GITHUB_OUTPUT
            echo "port=8000" >> $GITHUB_OUTPUT
            echo "image_tag=main" >> $GITHUB_OUTPUT
            echo "image_var=PROD_IMAGE_TAG" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "service=backend-dev" >> $GITHUB_OUTPUT
            echo "port=8001" >> $GITHUB_OUTPUT
            echo "image_tag=develop" >> $GITHUB_OUTPUT
            echo "image_var=DEV_IMAGE_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Fetch secrets from GSM
        run: |
          VPS_HOST=$(gcloud secrets versions access latest --secret=VPS_HOST --project=${{ env.GCP_PROJECT_ID }})
          VPS_USER=$(gcloud secrets versions access latest --secret=VPS_USER --project=${{ env.GCP_PROJECT_ID }})
          VPS_SSH_KEY=$(gcloud secrets versions access latest --secret=VPS_SSH_KEY --project=${{ env.GCP_PROJECT_ID }})
          GHCR_TOKEN=$(gcloud secrets versions access latest --secret=GHCR_TOKEN --project=${{ env.GCP_PROJECT_ID }})
          
          echo "::add-mask::$VPS_HOST"
          echo "::add-mask::$VPS_USER"
          echo "::add-mask::$VPS_SSH_KEY"
          echo "::add-mask::$GHCR_TOKEN"
          
          echo "VPS_HOST=$VPS_HOST" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "GHCR_TOKEN=$GHCR_TOKEN" >> $GITHUB_ENV
          
          echo "VPS_SSH_KEY<<EOFKEY" >> $GITHUB_ENV
          echo "$VPS_SSH_KEY" >> $GITHUB_ENV
          echo "EOFKEY" >> $GITHUB_ENV

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            cd /app
            # Reset any local changes to ensure clean deployment
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            git clean -fd
            
            echo "$GHCR_TOKEN" | docker login ghcr.io -u graphfolio --password-stdin
            
            # Pull new image for this service
            ${{ steps.env.outputs.image_var }}=${{ steps.env.outputs.image_tag }} docker compose -f docker-compose.multi.yml pull ${{ steps.env.outputs.service }}
            
            # Ensure shared services are running
            docker compose -f docker-compose.multi.yml up -d redis netdata
            
            # Wait for redis to be healthy
            sleep 5
            
            # Deploy only this specific service (doesn't affect other environments)
            ${{ steps.env.outputs.image_var }}=${{ steps.env.outputs.image_tag }} docker compose -f docker-compose.multi.yml up -d --no-deps ${{ steps.env.outputs.service }}
            
            docker image prune -f
            sleep 15
            curl -f http://localhost:${{ steps.env.outputs.port }}/health || exit 1

      - name: Deployment summary
        run: |
          echo "### Deployed to ${{ steps.env.outputs.environment }}!" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Port:** ${{ steps.env.outputs.port }}" >> $GITHUB_STEP_SUMMARY
