# Local development infrastructure (Redis + Postgres).
#
# The VPS runs all three environments from docker-compose.multi.yml — this file is
# ONLY for local development. Run the backend itself with `python -m src.main`
# (see CLAUDE.md); use this just to bring up its backing services:
#
#   docker compose up -d redis        # Redis only (default: USE_POSTGRES=false → SQLite)
#   docker compose up -d              # Redis + Postgres (for local USE_POSTGRES=true)

services:
  redis:
    image: redis:7-alpine
    container_name: tinboker-redis-local
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: tinboker-postgres-local
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: podcast_user
      POSTGRES_DB: podcast_db
      # Local-only default; override via backend/.env if you want.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podcast_user -d podcast_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
