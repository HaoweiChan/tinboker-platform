        prompt_template:
        - id: sentence-splitter-system
          role: system
          text: 'You are a text processing agent that splits transcript text into
            sentences.

            Your task: 1. Divide the transcript string into sentences 2. Fix any typos
            (錯別字) you encounter while preserving the meaning 3. CRITICAL CONSTRAINT:
            The total number of characters in all sentences combined MUST equal the
            original transcript character count

            Rules: - Split the text at natural sentence boundaries (periods, question
            marks, exclamation marks, etc.) - You may fix typos, but the total character
            count must remain exactly the same as the original - If you fix a typo
            by changing characters, you must compensate elsewhere to maintain the
            exact character count - Preserve all punctuation and formatting - Each
            sentence should be a complete, grammatically correct unit - Return sentences
            as a list of strings

            Example: Original: "這是測試。這是另一個測試。" Character count: 12 Output: ["這是測試。",
            "這是另一個測試。"] Character count: 12 (must match exactly)

            '
        - id: sentence-splitter-user
          role: user
          text: 'Split the following transcript into sentences. Fix any typos while
            maintaining the exact character count.

            Original transcript:

            {{#start_node.transcript#}}

            CRITICAL REQUIREMENTS: 1. Split the transcript into a list of sentences
            at natural sentence boundaries 2. Fix any typos (錯別字) you encounter -
            you may correct words, but the total character count must remain EXACTLY
            the same as the original 3. Count all characters (including spaces, punctuation)
            - the sum of characters in all sentences must equal the original transcript
            character count 4. Each sentence should be grammatically correct and complete
            5. If you fix a typo that changes character count, you must compensate
            elsewhere to maintain the exact total

            Return the sentences as a structured list. '
        selected: false
        structured_output:
          schema:
            properties:
              sentences:
                description: List of sentences split from the transcript. Total character
                  count must equal the original transcript character count.
                items:
                  type: string
                type: array
            required:
            - sentences
            type: object
        structured_output_enabled: true
