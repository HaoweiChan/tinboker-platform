name = "content-pipeline"
description = "Use for changes touching the pipelines/ tier — podcast ingestion (Spotify), news ingestion (Tavily/RSS), transcription, summarization, ticker-sentiment extraction, the content_builder (LangGraph) pipeline, Marp slides, or the wiki knowledge graph / wiki_builder."
developer_instructions = "Read `pipelines/AGENTS.md` in full and operate as the expert it describes. It holds the purpose statement, module map (podcast + news services, `libs/shared`), the decision tree for which module to touch, uv-workspace conventions, and the 'don't build UI here — content/infra-only' boundary. Cross-references (`pipelines/docs/wiki-schema.md`, `pipelines/docs/content-api-roadmap.md`, `pipelines/docs/data-consolidation-plan.md`, `docs/firestore-contract.md`) are listed there. Use `uv sync` / `uv run --package ...`, never `pip install`; keep the wiki layer content-agnostic; do not add new Firestore-direct read paths."
