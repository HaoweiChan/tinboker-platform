# Multi-environment deployment workflow
# - PR to develop/main: Build image, comment on PR
# - Push to develop: Deploy to dev environment (port 8001, dev-api.tinboker.com)
# - Push to main: Deploy to staging environment (port 8002, staging-api.tinboker.com)
# - Push tag v*: Deploy to production (port 8000, api.tinboker.com)
# - Manual trigger: Build and/or deploy to staging

name: Backend Build & Deploy

on:
  pull_request:
    branches: [develop, main]
    paths: ['backend/**']
  push:
    branches: [develop, main]
    tags: ['v*']
    paths: ['backend/**']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy to staging'
        required: true
        default: 'latest'
      build_image:
        description: 'Build image from branch before deploying'
        required: true
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: haoweichan/tinboker-backend
  GCP_PROJECT_ID: gen-lang-client-0901363254

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      id-token: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: image-tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image-tag.outputs.tag }}
            type=sha,prefix=

      - name: Build and push Docker image
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_image == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on PR with image info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const imageTag = '${{ steps.image-tag.outputs.tag }}';
            const imageName = 'ghcr.io/haoweichan/tinboker-backend:' + imageTag;
            const body = [
              '## Docker Image Built',
              '',
              '**Image:** `' + imageName + '`',
              '',
              '### Test on staging manually:',
              'Go to Actions → Backend Build & Deploy → Run workflow, enter image tag: `' + imageTag + '`',
              '',
              '### Or deploy directly:',
              '```bash',
              'ssh root@VPS "cd /app/backend && STAGING_IMAGE_TAG=' + imageTag + ' docker compose -f docker-compose.multi.yml up -d --no-deps backend-staging"',
              '```'
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine deployment environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "service=backend-staging" >> $GITHUB_OUTPUT
            echo "port=8002" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "image_var=STAGING_IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "api_host=staging-api.tinboker.com" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "service=backend-prod" >> $GITHUB_OUTPUT
            echo "port=8000" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "image_var=PROD_IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "api_host=api.tinboker.com" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "service=backend-staging" >> $GITHUB_OUTPUT
            echo "port=8002" >> $GITHUB_OUTPUT
            echo "image_tag=main" >> $GITHUB_OUTPUT
            echo "image_var=STAGING_IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "api_host=staging-api.tinboker.com" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "service=backend-dev" >> $GITHUB_OUTPUT
            echo "port=8001" >> $GITHUB_OUTPUT
            echo "image_tag=develop" >> $GITHUB_OUTPUT
            echo "image_var=DEV_IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "api_host=dev-api.tinboker.com" >> $GITHUB_OUTPUT
          fi

      - name: Fetch secrets from GSM
        run: |
          VPS_HOST=$(gcloud secrets versions access latest --secret=VPS_HOST --project=${{ env.GCP_PROJECT_ID }})
          VPS_USER=$(gcloud secrets versions access latest --secret=VPS_USER --project=${{ env.GCP_PROJECT_ID }})
          VPS_SSH_KEY=$(gcloud secrets versions access latest --secret=VPS_SSH_KEY --project=${{ env.GCP_PROJECT_ID }})
          GHCR_TOKEN=$(gcloud secrets versions access latest --secret=GHCR_TOKEN --project=${{ env.GCP_PROJECT_ID }})
          GCP_CREDS_JSON=$(gcloud secrets versions access latest --secret=GCP_CREDENTIALS_JSON --project=${{ env.GCP_PROJECT_ID }})
          POSTGRES_PASSWORD=$(gcloud secrets versions access latest --secret=POSTGRES_PASSWORD --project=${{ env.GCP_PROJECT_ID }})
          # Optional — used for the post-deploy Cloudflare edge cache purge.
          CLOUDFLARE_API_TOKEN=$(gcloud secrets versions access latest --secret=CLOUDFLARE_API_TOKEN --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || echo "")
          CLOUDFLARE_ZONE_TAG=$(gcloud secrets versions access latest --secret=CLOUDFLARE_ZONE_TAG --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || echo "")

          echo "::add-mask::$VPS_HOST"
          echo "::add-mask::$VPS_USER"
          echo "::add-mask::$VPS_SSH_KEY"
          echo "::add-mask::$GHCR_TOKEN"
          echo "::add-mask::$GCP_CREDS_JSON"
          echo "::add-mask::$POSTGRES_PASSWORD"
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "::add-mask::$CLOUDFLARE_ZONE_TAG"

          echo "VPS_HOST=$VPS_HOST" >> $GITHUB_ENV
          echo "VPS_USER=$VPS_USER" >> $GITHUB_ENV
          echo "GHCR_TOKEN=$GHCR_TOKEN" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> $GITHUB_ENV
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> $GITHUB_ENV
          echo "CLOUDFLARE_ZONE_TAG=$CLOUDFLARE_ZONE_TAG" >> $GITHUB_ENV

          echo "VPS_SSH_KEY<<EOFKEY" >> $GITHUB_ENV
          echo "$VPS_SSH_KEY" >> $GITHUB_ENV
          echo "EOFKEY" >> $GITHUB_ENV

          echo "GCP_CREDS_JSON<<EOFGCP" >> $GITHUB_ENV
          echo "$GCP_CREDS_JSON" >> $GITHUB_ENV
          echo "EOFGCP" >> $GITHUB_ENV

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GCP_CREDS_JSON,POSTGRES_PASSWORD
          script: |
            cd /app
            git fetch origin --tags
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              git checkout -f "${{ github.ref_name }}"
            else
              git checkout -f "origin/${{ github.ref_name }}"
            fi

            cd /app/backend

            # Ensure GCP service account key is present
            echo "$GCP_CREDS_JSON" > gcp-service-account.json
            chmod 600 gcp-service-account.json

            echo "$GHCR_TOKEN" | docker login ghcr.io -u haoweichan --password-stdin

            ${{ steps.env.outputs.image_var }}=${{ steps.env.outputs.image_tag }} docker compose -f docker-compose.multi.yml pull ${{ steps.env.outputs.service }}

            docker compose -f docker-compose.multi.yml up -d --no-recreate postgres redis netdata

            ${{ steps.env.outputs.image_var }}=${{ steps.env.outputs.image_tag }} docker compose -f docker-compose.multi.yml up -d --no-deps ${{ steps.env.outputs.service }}

            docker image prune -f
            for i in $(seq 1 12); do
              curl -sf http://localhost:${{ steps.env.outputs.port }}/health && break
              [ $i -eq 12 ] && { echo "Health check failed after 60s"; exit 1; }
              sleep 5
            done

      # Drop the Cloudflare edge cache only AFTER the new container is healthy, so the
      # edge re-fetches fresh /api/* instead of serving pre-deploy copies until TTL
      # (s-maxage up to 1h, plus a /api/* cache rule that over-caches). Best-effort:
      # a purge failure logs a warning but never fails an otherwise-good deploy.
      - name: Purge Cloudflare CDN cache
        if: success()
        env:
          CF_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_TAG: ${{ env.CLOUDFLARE_ZONE_TAG }}
          API_HOST: ${{ steps.env.outputs.api_host }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_TAG" ]; then
            echo "::warning::Cloudflare credentials missing (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ZONE_TAG in GSM); skipping CDN purge."
            exit 0
          fi
          API_URL="https://api.cloudflare.com/client/v4/zones/${CF_ZONE_TAG}/purge_cache"
          echo "Purging Cloudflare edge cache for host ${API_HOST} ..."
          # Host-scoped purge (matches the manual recipe documented in CLAUDE.md).
          # Purge by host requires an Enterprise plan; on other plans Cloudflare
          # returns success:false and we fall back to purging the whole zone.
          RESP=$(curl -sS -X POST "$API_URL" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"hosts\":[\"${API_HOST}\"]}" || true)
          if echo "$RESP" | grep -Eq '"success":[[:space:]]*true'; then
            echo "✅ Edge cache purged for host ${API_HOST}"
            exit 0
          fi
          echo "::warning::Host-scoped purge unavailable (likely non-Enterprise plan); falling back to purge_everything. Response: ${RESP:-<none>}"
          RESP2=$(curl -sS -X POST "$API_URL" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || true)
          if echo "$RESP2" | grep -Eq '"success":[[:space:]]*true'; then
            echo "✅ Purged entire zone cache."
          else
            echo "::warning::Cloudflare cache purge failed; edge may serve stale /api/* until TTL. Response: ${RESP2:-<none>}"
          fi

      - name: Deployment summary
        run: |
          echo "### Deployed to ${{ steps.env.outputs.environment }}!" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Port:** ${{ steps.env.outputs.port }}" >> $GITHUB_STEP_SUMMARY
          echo "**CDN purge:** attempted for host ${{ steps.env.outputs.api_host }} (see 'Purge Cloudflare CDN cache' step)" >> $GITHUB_STEP_SUMMARY
