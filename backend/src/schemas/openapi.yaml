      - visuals
      summary: Get Cluster
      description: 'Get cluster visualization graph


        Returns cluster/force-directed visualization data with real financial data'
      operationId: get_cluster_api_visuals_cluster_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/visuals/interactive-models:
    get:
      tags:
      - visuals
      summary: Get Interactive Models
      description: 'Get interactive models


        Returns list of interactive article/visualization models for the homepage/news
        experience'
      operationId: get_interactive_models_api_visuals_interactive_models_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/podcast:
    get:
      tags:
      - podcast
      summary: Get Sorted Podcasts
      description: 'Get sorted podcasts list


        Query params:

        - sort_by: Sort field (name, episode_count, created_at, updated_at)

        - order: Sort order (asc, desc)

        - limit: Maximum number of podcasts to return (1-200)

        - offset: Pagination offset


        CDN Cache: 30 minutes'
      operationId: get_sorted_podcasts_api_podcast_get
      parameters:
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          description: Sort field (name, episode_count, created_at, updated_at)
          default: name
          title: Sort By
        description: Sort field (name, episode_count, created_at, updated_at)
      - name: order
        in: query
        required: false
        schema:
          type: string
          description: Sort order (asc, desc)
          default: asc
          title: Order
        description: Sort order (asc, desc)
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Maximum number of podcasts to return (1-200)
          default: 50
          title: Limit
        description: Maximum number of podcasts to return (1-200)
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset
          default: 0
          title: Offset
        description: Pagination offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Podcast'
                title: Response Get Sorted Podcasts Api Podcast Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/podcast/{podcast_name}:
    get:
      tags:
      - podcast
      summary: Get Podcast By Name
      description: 'Get podcast by name


        Returns podcast metadata including episode count and timestamps


