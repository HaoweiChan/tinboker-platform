      operationId: get_podcast_by_name_api_podcast__podcast_name__get
      parameters:
      - name: podcast_name
        in: path
        required: true
        schema:
          type: string
          description: Podcast name
          title: Podcast Name
        description: Podcast name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
